<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Majestic OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }

        #fake-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f7f8fa; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; padding-top: 60px; overflow-y: auto;
        }
        .sparx-header { color: #351c75; font-size: 42px; font-weight: 700; margin-bottom: 30px; letter-spacing: -1px; }
        .school-banner {
            background: white; width: 480px; max-width: 90%;
            border: 1px solid #e2e8f0; border-radius: 4px; padding: 16px 20px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .school-text { font-size: 0.9rem; color: #475569; }
        .school-name { display: block; font-weight: 700; color: #0f172a; margin-top: 2px; font-size: 1rem; }
        .switch-link { color: #351c75; text-decoration: underline; font-size: 0.9rem; cursor: pointer; }
        .login-box {
            background: white; width: 480px; max-width: 90%; border: 1px solid #e2e8f0; border-radius: 8px;
            padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .login-title { font-size: 1.1rem; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
        .ms-login-btn {
            background: #351c75; color: white; width: 100%; padding: 12px;
            border-radius: 30px; border: none; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            cursor: pointer; transition: background 0.2s; margin-bottom: 25px;
        }
        .ms-login-btn:hover { background: #241255; }
        .ms-logo { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 18px; height: 18px; }
        .ms-sq { background: white; width: 100%; height: 100%; }
        .divider { display: flex; align-items: center; text-align: center; color: #64748b; margin: 20px 0; font-size: 0.9rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider::before { margin-right: 15px; } .divider::after { margin-left: 15px; }
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; font-size: 0.9rem; color: #64748b; margin-bottom: 6px; font-weight: 600; }
        .sparx-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1rem; color: #334155; outline: none; }
        .sparx-submit { width: 100%; padding: 12px; border-radius: 30px; border: none; background: #351c75; color: white; font-weight: 600; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        .footer-links { margin-top: 25px; text-align: center; font-size: 0.9rem; }
        .footer-links a { color: #351c75; text-decoration: underline; margin: 0 5px; cursor: pointer; }

        :root {
            --bg-color: #0f172a; --sidebar-bg: rgba(15, 23, 42, 0.95); --content-bg: rgba(30, 41, 59, 0.7);
            --text-color: #e2e8f0; --accent-color: #8b5cf6; --glass-border: rgba(255, 255, 255, 0.1);
            --animation-speed: 0.2s;
        }
        body.theme-galaxy { background: radial-gradient(ellipse at bottom,#1b2735 0%,#090a0f 100%); color: var(--text-color); }
        body.theme-dark-nebula { --bg-color: #0d0d1a; --sidebar-bg: rgba(29,13,46,0.95); --content-bg: rgba(46,20,68,0.7); --text-color: #f0f4ff; --accent-color: #db2777; --glass-border: rgba(251,113,133,0.3); background: radial-gradient(ellipse at bottom,#3b0764 0%,#0d0d1a 100%); color: var(--text-color); }
        body.theme-matte { --bg-color: #18181b; --sidebar-bg: #18181b; --content-bg: #27272a; --text-color: #d4d4d8; --accent-color: #a1a1aa; --glass-border: rgba(255,255,255,0.1); background: var(--bg-color); color: var(--text-color); }
        body.theme-light { --bg-color: #f8fafc; --sidebar-bg: #fff; --content-bg: #f1f5f9; --text-color: #334155; --accent-color: #3b82f6; --glass-border: #e2e8f0; background: var(--bg-color); color: var(--text-color); }
        body.theme-neon { --bg-color: #000; --sidebar-bg: #111; --content-bg: #000; --text-color: #0ff; --accent-color: #0ff; --glass-border: #0ff; background: #000; color: #0ff; }
        body.theme-galaxy-void { --bg-color: #020420; --sidebar-bg: rgba(20,20,40,0.98); --content-bg: rgba(30,30,60,0.8); --text-color: #e0f2fe; --accent-color: #a78bfa; --glass-border: rgba(167,139,250,0.2); background: radial-gradient(ellipse at bottom,#07153a 0%,#020420 100%); color: var(--text-color); }
        body.theme-cyber-night { --bg-color: #1f2937; --sidebar-bg: rgba(31,41,55,0.95); --content-bg: rgba(55,65,81,0.7); --text-color: #e5e7eb; --accent-color: #00ffff; --glass-border: rgba(0,255,255,0.3); background: #1f2937; color: var(--text-color); }
        body.theme-minimal-white { --bg-color: #fff; --sidebar-bg: #fff; --content-bg: #f9fafb; --text-color: #1f2937; --accent-color: #1f2937; --glass-border: #e5e7eb; background: #fff; color: #1f2937; }
        body.theme-frost { --bg-color: #f0f9ff; --sidebar-bg: rgba(255,255,255,0.9); --content-bg: #e0f2ff; --text-color: #1e3a8a; --accent-color: #60a5fa; --glass-border: #bfdbfe; background: #f0f9ff; color: #1e3a8a; }
        body.theme-retro-arcade { --bg-color: #101010; --sidebar-bg: #101010; --content-bg: #202020; --text-color: #fff000; --accent-color: #ff00ff; --glass-border: #ff00ff; background: #101010; color: #fff000; }
        body.theme-console-os { --bg-color: #0c1a2c; --sidebar-bg: rgba(12,26,44,0.95); --content-bg: rgba(22,38,59,0.8); --text-color: #d1d5db; --accent-color: #34d399; --glass-border: rgba(52,211,153,0.2); background: #0c1a2c; color: var(--text-color); }
        body.theme-ai-core { --bg-color: #000; --sidebar-bg: rgba(20,0,30,0.95); --content-bg: rgba(30,0,50,0.8); --text-color: #c084fc; --accent-color: #c084fc; --glass-border: rgba(192,132,252,0.3); background: #000; color: #c084fc; }
        body.theme-quantum { --bg-color: #1f003b; --sidebar-bg: rgba(31,0,59,0.95); --content-bg: rgba(50,20,70,0.8); --text-color: #e9d5ff; --accent-color: #c4b5fd; --glass-border: rgba(196,181,253,0.2); background: #1f003b; color: var(--text-color); }
        body.theme-crimson { --bg-color: #000; --sidebar-bg: #1a0000; --content-bg: #330000; --text-color: #fca5a5; --accent-color: #f87171; --glass-border: rgba(248,113,113,0.2); background: #000; color: #fca5a5; }
        body.theme-ocean-blue { --bg-color: #0f172a; --sidebar-bg: rgba(22,101,196,0.9); --content-bg: rgba(30,58,138,0.8); --text-color: #e0f7fa; --accent-color: #2dd4bf; --glass-border: rgba(45,212,191,0.3); background: linear-gradient(135deg,#1e3a8a 0%,#0369a1 100%); color: var(--text-color); }
        body.theme-performance-mode { --bg-color: #000; --sidebar-bg: #000; --content-bg: #000; --text-color: #fff; --accent-color: #fff; --glass-border: #1f2937; background: #000; color: #fff; --animation-speed: 0s; }

        .card, .nav-item { transition: transform var(--animation-speed), box-shadow var(--animation-speed), background var(--animation-speed); }
        #stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: var(--text-color); border-radius: 50%; animation: twinkle var(--duration) infinite ease-in-out; }
        @keyframes twinkle { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        #majestic-os { display: none; width: 100%; height: 100%; flex-direction: row; }
        .sidebar { width: 220px; display: flex; flex-direction: column; background: var(--sidebar-bg); border-right: 1px solid var(--glass-border); backdrop-filter: blur(10px); z-index: 10; padding: 20px 0; }
        .sidebar-header { padding: 0 24px 20px; font-weight: 800; font-size: 1.2rem; color: var(--accent-color); }
        .nav-item { padding: 12px 24px; cursor: pointer; font-size: 0.95rem; font-weight: 500; color: var(--text-color); opacity: 0.7; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); opacity: 1; border-left-color: var(--accent-color); }
        .sidebar-footer { margin-top: auto; padding: 20px; }
        .panic-btn-mini { width: 100%; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-bar { height: 60px; display: flex; align-items: center; padding: 0 24px; background: rgba(0,0,0,0.1); border-bottom: 1px solid var(--glass-border); }
        .universal-search { flex: 1; max-width: 600px; }
        .search-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 10px 16px; border-radius: 20px; color: var(--text-color); outline: none; }
        .view-section { display: none; flex: 1; overflow-y: auto; padding: 24px; animation: fadeIn 0.2s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .card { background: var(--content-bg); border-radius: 12px; overflow: hidden; aspect-ratio: 1/1.2; border: 1px solid var(--glass-border); cursor: pointer; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .card-image-container { flex: 1; width: 100%; overflow: hidden; background: #000; }
        .card-icon { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card:hover .card-icon { transform: scale(1.05); }
        .card-info { background: var(--sidebar-bg); padding: 10px 12px; border-top: 1px solid var(--glass-border); flex-shrink: 0; }
        .card-title { font-weight: 700; font-size: 0.95rem; color: var(--text-color); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tag { font-size: 0.7rem; color: var(--accent-color); font-weight: 500; opacity: 0.8; }
        .local-search { width: 100%; margin-bottom: 20px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 12px 16px; border-radius: 8px; color: var(--text-color); outline: none; font-size: 0.95rem; }
        .local-search::placeholder { color: rgba(255,255,255,0.3); }
        .theme-button-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .theme-button { padding: 8px; background: var(--content-bg); border: 1px solid var(--glass-border); color: var(--text-color); border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .theme-button:hover { border-color: var(--accent-color); }
        .setting-group { margin-bottom: 24px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--glass-border); }
        .setting-title { font-weight: 700; margin-bottom: 12px; display: block; color: var(--text-color); font-size: 1rem; }
        #iframe-viewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 50; display: none; flex-direction: column; }
        #iframe-viewer.portrait-mode { align-items: center; justify-content: center; background: rgba(0,0,0,0.92); flex-direction: column; }
        #iframe-viewer.portrait-mode .viewer-controls { width: 100%; flex-shrink: 0; }
        #iframe-viewer.portrait-mode #main-iframe { width: 390px; max-width: min(390px, 50vh); height: calc(100% - 40px); flex: none; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        .viewer-controls { height: 40px; background: #111; display: flex; align-items: center; padding: 0 16px; justify-content: space-between; }
        .viewer-close { background: #333; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        #main-iframe { width: 100%; flex: 1; border: none; }
    </style>
</head>
<body class="theme-galaxy">
<div id="stars-container"></div>

<div id="fake-login">
    <div class="sparx-header">Sparx Reader</div>
    <div class="school-banner">
        <div><span class="school-text">You are logging into:</span><span class="school-name">The Westleigh School</span></div>
        <span class="switch-link">Switch school</span>
    </div>
    <div class="login-box">
        <div class="login-title">Log in as a student or teacher</div>
        <button class="ms-login-btn" onclick="unlockOS()">
            <div class="ms-logo"><div class="ms-sq"></div><div class="ms-sq"></div><div class="ms-sq"></div><div class="ms-sq"></div></div>
            Log in to Sparx using Microsoft
        </button>
        <div class="divider">or</div>
        <div class="login-title" style="font-size:1rem;margin-bottom:15px;">Use your Sparx login</div>
        <div class="input-group"><label class="input-label">Username:</label><input type="text" class="sparx-input" placeholder="sparxuser10"></div>
        <div class="input-group"><label class="input-label">Password:</label><input type="password" class="sparx-input" placeholder="Password"></div>
        <button class="sparx-submit" onclick="unlockOS()">Log in</button>
    </div>
    <div class="footer-links"><a>New student?</a> | <a>Forgot login details?</a></div>
</div>

<div id="majestic-os">
    <div class="sidebar">
        <div class="sidebar-header">MAJESTIC OS</div>
        <div class="nav-item active" onclick="switchTab('games',this)">Games</div>
        <div class="nav-item" onclick="switchTab('settings',this)">Settings</div>
        <div class="sidebar-footer"><button class="panic-btn-mini" onclick="panic()">PANIC (ESC)</button></div>
    </div>
    <div class="main-area">
        <div class="top-bar">
            <div class="universal-search">
                <input type="text" id="omni-search" class="search-input" placeholder="Search Google or type URL..." onkeypress="handleSearch(event)">
            </div>
            <div style="margin-left:20px;font-size:0.9rem;opacity:0.7;" id="clock">12:00</div>
        </div>

        <div id="tab-games" class="view-section active">
            <h2 style="margin-bottom:15px;font-weight:300;">Library</h2>
            <input type="text" id="search-games" class="local-search" placeholder="Filter games..." onkeyup="filterGrid('search-games','games-grid')">
            <div class="grid-container" id="games-grid"></div>
        </div>

        <div id="tab-settings" class="view-section">
            <h2 style="margin-bottom:20px;">System Settings</h2>
            <div class="setting-group">
                <span class="setting-title">Appearance</span>
                <div class="theme-button-container">
                    <button class="theme-button" onclick="setTheme('galaxy')">Galaxy</button>
                    <button class="theme-button" onclick="setTheme('dark-nebula')">Dark Nebula</button>
                    <button class="theme-button" onclick="setTheme('matte')">Matte</button>
                    <button class="theme-button" onclick="setTheme('light')">Light</button>
                    <button class="theme-button" onclick="setTheme('neon')">Neon</button>
                    <button class="theme-button" onclick="setTheme('galaxy-void')">Galaxy Void</button>
                    <button class="theme-button" onclick="setTheme('cyber-night')">Cyber Night</button>
                    <button class="theme-button" onclick="setTheme('minimal-white')">Minimal White</button>
                    <button class="theme-button" onclick="setTheme('frost')">Frost</button>
                    <button class="theme-button" onclick="setTheme('retro-arcade')">Retro Arcade</button>
                    <button class="theme-button" onclick="setTheme('console-os')">Console OS</button>
                    <button class="theme-button" onclick="setTheme('ai-core')">AI Core</button>
                    <button class="theme-button" onclick="setTheme('timeout')">Quantum</button>
                    <button class="theme-button" onclick="setTheme('crimson')">Crimson</button>
                    <button class="theme-button" onclick="setTheme('ocean-blue')">Ocean Blue</button>
                    <button class="theme-button" onclick="setTheme('performance-mode')">Performance Mode</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="iframe-viewer">
    <div class="viewer-controls">
        <span style="color:white;font-size:0.9rem;" id="viewer-title">App</span>
        <button class="viewer-close" onclick="closeViewer()">Close X</button>
    </div>
    <iframe id="main-iframe" src="about:blank" allowfullscreen sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"></iframe>
</div>

    const THEME_KEY = 'majesticOS_theme';

    function setTheme(t, save = true) {
        document.body.className = 'theme-' + t;
        if (save) localStorage.setItem(THEME_KEY, t);
    }

    window.onload = function () {
        setTheme(localStorage.getItem(THEME_KEY) || 'galaxy', false);
        createStars();
        renderGrid('games-grid', games);
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') panic(); });
    };

    function panic() {
        document.getElementById('majestic-os').style.display = 'none';
        closeViewer();
        document.getElementById('fake-login').style.display = 'flex';
    }

    function switchTab(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(s => s.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    function renderGrid(id, items) {
        const c = document.getElementById(id);
        if (!c) return;
        c.innerHTML = '';
        items.forEach(i => {
            const d = document.createElement('div');
            d.className = 'card';
            d.innerHTML = `
                <div class="card-image-container">
                    <img src="${i.img}" class="card-icon" alt="${i.name}" onerror="this.onerror=null;this.src='https://placehold.co/400x400/1e293b/white?text=${encodeURIComponent(i.name)}';">
                </div>
                <div class="card-info">
                    <div class="card-title">${i.name}</div>
                    <div class="card-tag">${i.tag}</div>
                </div>`;
            d.onclick = () => {
                document.getElementById('viewer-title').innerText = i.name;
                const viewer = document.getElementById('iframe-viewer');
                if (i.portrait) { viewer.classList.add('portrait-mode'); } else { viewer.classList.remove('portrait-mode'); }
                if (i.isBlob) {
                    const blob = new Blob([i.content], { type: 'text/html' });
                    document.getElementById('main-iframe').src = URL.createObjectURL(blob);
                } else {
                    document.getElementById('main-iframe').src = i.url;
                }
                viewer.style.display = 'flex';
            };
            c.appendChild(d);
        });
    }

    function filterGrid(inputId, gridId) {
        const filter = document.getElementById(inputId).value.toLowerCase();
        for (let c of document.getElementById(gridId).getElementsByClassName('card')) {
            c.style.display = c.querySelector('.card-title').innerText.toLowerCase().includes(filter) ? '' : 'none';
        }
    }

    function closeViewer() {
        const viewer = document.getElementById('iframe-viewer');
        viewer.style.display = 'none';
        viewer.classList.remove('portrait-mode');
        if (document.getElementById('main-iframe').src.startsWith('blob:')) {
            URL.revokeObjectURL(document.getElementById('main-iframe').src);
        }
        document.getElementById('main-iframe').src = 'about:blank';
    }

    function handleSearch(e) {
        if (e.key !== 'Enter') return;
        let url = e.target.value.trim();
        if (!url.startsWith('http')) url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
        document.getElementById('viewer-title').innerText = 'Browser';
        document.getElementById('main-iframe').src = url;
        document.getElementById('iframe-viewer').style.display = 'flex';
    }

    function createStars() {
        const c = document.getElementById('stars-container');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = s.style.height = Math.random() * 3 + 1 + 'px';
            s.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            c.appendChild(s);
        }
    }
</script>
